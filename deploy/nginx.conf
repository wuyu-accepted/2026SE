# 应用服务器 Nginx 配置
# 用途：托管辅导员 Vue 端静态文件 + 反向代理后端 API + 小程序/前端CORS支持
#
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/conf.d/ruc-platform.conf
#   2. 修改 server_name 为你的实际域名或 IP
#   3. 确保 dist 目录路径正确
#   4. nginx -t 检查配置，nginx -s reload 重载

server {
    listen 80;
    server_name _;  # 替换为实际域名或 IP，如 api.ruc-platform.com

    # 字符集
    charset utf-8;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # 辅导员 Vue 端静态文件（生产构建产物）
    root /var/www/ruc-platform/web-counselor/dist;
    index index.html;

    # Vue 前端路由（SPA 历史模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # 大文件上传支持
        client_max_body_size 20M;
    }

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
