# 应用服务器部署配置（双服务器模式）
# 后端连接远程数据库服务器，通过环境变量配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:ruc_platform}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial baseline for server deploy
    clean-disabled: true
    validate-on-migrate: true

mybatis-plus:
  global-config:
    db-config:
      db-type: postgresql

logging:
  level:
    com.ruc.platform: info
    com.ruc.platform.mapper: warn
    org.springframework.web: info
