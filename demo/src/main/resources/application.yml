server:
  port: ${SERVER_PORT:18080}

spring:
  application:
    name: ruc-service-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ruc.platform.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      db-type: postgresql

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

wechat:
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}
  officialaccount:
    appid:
    secret:
    menu:
      home-url:
      notice-url:
      service-url:

file:
  upload-path: ${FILE_UPLOAD_PATH:${user.home}/ruc-platform/uploads}

study:
  plan:
    course-json-path: ${STUDY_PLAN_COURSE_JSON_PATH:course.json}

logging:
  level:
    com.ruc.platform: debug
    com.ruc.platform.mapper: debug
    org.mybatis: debug
